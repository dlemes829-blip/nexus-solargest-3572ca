services:
  - type: web
    name: solargest
    runtime: node
    plan: free
    buildCommand: npm install --ignore-scripts --no-audit --no-fund && npm run build && npm test
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 24.15.0
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-postgres
          property: connectionString

databases:
  - name: nexus-postgres
    plan: free
